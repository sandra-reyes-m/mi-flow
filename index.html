<html lang="es">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>

  <style>
    :root{--header:#0f172a;--stage:#fafbfc;--accent:#6366f1;--accent-soft:#eef2ff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--panel:#fff;--toolbar:#fff;--shadow:0 12px 32px rgba(15,23,42,.12)}
    *{box-sizing:border-box}html,body,#root{width:100%;height:100%;margin:0;overflow:hidden;font-family:Inter,system-ui,sans-serif;color:var(--text)}button,input,textarea{font:inherit}
    /* Shell */

    .tabbar{height:34px;background:#1e293b;display:flex;align-items:center;padding:0 8px;gap:3px;overflow-x:auto;border-bottom:1px solid #0f172a;flex-shrink:0}
    .tabbar::-webkit-scrollbar{height:3px}.tabbar::-webkit-scrollbar-thumb{background:#475569;border-radius:2px}

    .tab:hover{background:rgba(255,255,255,.1);color:#e2e8f0}.tab.active{background:rgba(99,102,241,.3);border-color:rgba(99,102,241,.55);color:#e0e7ff}

    .tab-new{height:26px;width:26px;border:1px dashed rgba(255,255,255,.2);background:transparent;color:#94a3b8;border-radius:7px;cursor:pointer;font-size:18px;line-height:1;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
    .tab-new:hover{background:rgba(255,255,255,.08);color:#e2e8f0}
    /* App */
    .app{display:grid;grid-template-rows:46px 1fr;flex:1;min-height:0;background:var(--stage)}
    .header{height:46px;background:var(--header);color:white;display:flex;align-items:center;justify-content:space-between;padding:0 12px;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:100}.brand{display:flex;align-items:center;gap:7px;font-weight:800;letter-spacing:-.02em;white-space:nowrap;font-size:13px}.brand small{font-weight:500;color:#cbd5e1}.brand .ver{font-size:9px;background:rgba(99,102,241,.6);color:#e0e7ff;border-radius:4px;padding:2px 5px;font-family:DM Mono,monospace;font-weight:700;letter-spacing:.02em}.header-actions{display:flex;align-items:center;gap:5px}.chip{height:26px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#e2e8f0;border-radius:999px;padding:0 8px;display:flex;align-items:center;gap:5px;font-size:11px;white-space:nowrap}.hbtn{height:26px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:white;border-radius:7px;padding:0 7px;cursor:pointer;font-weight:700;font-size:11px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}.hbtn .ico{font-family:DM Mono,monospace;font-size:13px;line-height:1}.hbtn .txt{font-size:10.5px}.hbtn:hover:not(:disabled){background:rgba(255,255,255,.14)}.hbtn:disabled{opacity:.36;cursor:not-allowed}.dropdown{position:relative}.menu{position:absolute;right:0;top:32px;background:white;color:#0f172a;border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);padding:5px;min-width:150px;z-index:200}.menu button{display:block;width:100%;text-align:left;border:0;background:white;border-radius:7px;padding:7px 9px;cursor:pointer;font-size:11px;font-weight:700;color:#334155}.menu button:hover{background:#f1f5f9;color:#0f172a}.hidden-input{display:none}
    .main{display:grid;grid-template-columns:56px 1fr 0px;min-height:0;transition:grid-template-columns 180ms ease}.main.has-panel{grid-template-columns:56px 1fr 280px}.toolbar{background:var(--toolbar);border-right:1px solid var(--border);padding:8px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:90;box-shadow:2px 0 12px rgba(15,23,42,.04)}.tool-sep{height:1px;background:var(--border);width:32px;margin:5px 0}.tool{width:40px;height:40px;border:0;background:transparent;border-radius:12px;display:grid;place-items:center;cursor:pointer;position:relative;color:#475569}.tool:hover{background:#f1f5f9;color:#0f172a}.tool.active{background:var(--accent-soft);color:var(--accent)}.tool.active:before{content:"";position:absolute;left:-6px;top:9px;bottom:9px;width:3px;background:var(--accent);border-radius:999px}.tool svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.tool .tip{position:absolute;left:48px;top:50%;transform:translateY(-50%);background:#0f172a;color:white;font-size:12px;padding:6px 8px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:.12s;box-shadow:var(--shadow)}.tool:hover .tip{opacity:1}kbd{font-family:DM Mono,monospace;background:rgba(255,255,255,.16);padding:1px 5px;border-radius:4px;margin-left:6px;font-size:11px}
    .stage{position:relative;overflow:hidden;background:var(--stage);cursor:default;touch-action:none}.stage.hand{cursor:grab}.stage.panning{cursor:grabbing}.grid{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(#cbd5e1 1.05px,transparent 1.05px)}.world{position:absolute;left:0;top:0;transform-origin:0 0;width:1px;height:1px}.edge-layer{position:absolute;left:0;top:0;width:20000px;height:20000px;overflow:visible;z-index:5;pointer-events:none}.edge-visible{fill:none;pointer-events:none}.edge-hit{fill:none;stroke:transparent;stroke-width:14;pointer-events:stroke;cursor:pointer}.edge-label{position:absolute;z-index:18;background:white;border:1px solid var(--border);border-radius:999px;padding:3px 8px;font-size:11px;font-weight:700;color:#334155;box-shadow:0 2px 8px rgba(15,23,42,.1);transform:translate(-50%,-50%);min-width:26px;text-align:center}.edge-label.selected{outline:2px solid var(--accent)}
    .node{position:absolute;z-index:20;user-select:none;display:flex;flex-direction:column;align-items:stretch;justify-content:center;text-align:center;padding:0;font-weight:600;line-height:1.2;white-space:pre-wrap;word-break:break-word;background:white;border:1.5px solid #475569;color:#0f172a;border-radius:8px;box-shadow:0 2px 4px rgba(15,23,42,.04);cursor:grab;overflow:visible}.node.selected{outline:2px solid var(--accent);outline-offset:2px}.node.multi-selected{outline:2px dashed var(--accent);outline-offset:2px}.node-title{border-bottom:1px solid rgba(15,23,42,.12);padding:6px 8px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:#475569;background:rgba(248,250,252,.72);border-radius:7px 7px 0 0}.node-body{display:flex;align-items:center;justify-content:center;flex:1;padding:8px;min-height:22px}.node.t-round{border-radius:14px}.node.t-pill{border-radius:999px}.node.t-ellipse{border-radius:50%}.node.t-sticky{background:#fef08a;border-color:#ca8a04;color:#713f12;box-shadow:2px 3px 6px rgba(0,0,0,.12)}.node.t-sticky .node-title{background:rgba(254,240,138,.9);color:#713f12;border-color:rgba(113,63,18,.18)}.node.t-text{background:transparent!important;border-color:transparent!important;box-shadow:none;padding:2px}.node.t-text.selected{outline-style:dashed}.diamond-wrap{position:absolute;z-index:20;display:flex;align-items:center;justify-content:center;background:transparent!important;border:0!important;box-shadow:none;cursor:grab;overflow:visible;isolation:isolate}.diamond-wrap:before,.diamond-wrap:after{content:"";position:absolute;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);pointer-events:none}.diamond-wrap:before{inset:0;background:var(--diamond-stroke,#475569);z-index:0}.diamond-wrap:after{inset:2px;background:var(--diamond-fill,#ffffff);z-index:1}.diamond-wrap.selected{outline:2px solid var(--accent);outline-offset:2px}.diamond-wrap.multi-selected{outline:2px dashed var(--accent);outline-offset:2px}.diamond-text{position:relative;z-index:2;text-align:center;font-weight:600;line-height:1.2;white-space:pre-wrap;word-break:break-word;padding:8px 22px}.diamond-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:#475569;margin-bottom:5px;border-bottom:1px solid rgba(15,23,42,.12);padding-bottom:4px}
    .frame{position:absolute;z-index:1;border:1.5px solid #94a3b8;background:rgba(226,232,240,.22);border-radius:12px;user-select:none;cursor:grab}.frame.selected{outline:2px solid var(--accent);outline-offset:2px}.frame.multi-selected{outline:2px dashed var(--accent);outline-offset:2px}.frame-label{position:absolute;z-index:12;top:-24px;left:10px;min-height:20px;border-radius:7px;background:#64748b;color:white;font-family:DM Mono,monospace;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:4px 8px;white-space:nowrap;font-weight:500}.frame-label.hidden-label{display:none}.contain-badge{position:absolute;right:8px;top:8px;background:rgba(15,23,42,.75);color:white;font-size:10px;border-radius:999px;padding:2px 6px;font-weight:800;pointer-events:none}
    .handle{position:absolute;width:9px;height:9px;background:white;border:1.5px solid var(--accent);border-radius:2px;z-index:55}.h-nw{left:-6px;top:-6px;cursor:nwse-resize}.h-n{left:50%;top:-6px;transform:translateX(-50%);cursor:ns-resize}.h-ne{right:-6px;top:-6px;cursor:nesw-resize}.h-e{right:-6px;top:50%;transform:translateY(-50%);cursor:ew-resize}.h-se{right:-6px;bottom:-6px;cursor:nwse-resize}.h-s{left:50%;bottom:-6px;transform:translateX(-50%);cursor:ns-resize}.h-sw{left:-6px;bottom:-6px;cursor:nesw-resize}.h-w{left:-6px;top:50%;transform:translateY(-50%);cursor:ew-resize}.anchor{position:absolute;width:10px;height:10px;background:var(--accent);border:2px solid white;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.18);z-index:60;cursor:crosshair}.a-t{left:50%;top:-6px;transform:translateX(-50%)}.a-r{right:-6px;top:50%;transform:translateY(-50%)}.a-b{left:50%;bottom:-6px;transform:translateX(-50%)}.a-l{left:-6px;top:50%;transform:translateY(-50%)}
    .panel{background:var(--panel);border-left:1px solid var(--border);overflow:auto;padding:14px;box-shadow:-6px 0 18px rgba(15,23,42,.05);z-index:80}.panel h3{margin:0 0 12px;font-size:14px}.group{margin:0 0 14px}.label{font-size:11px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}.field{width:100%;border:1px solid var(--border);border-radius:10px;padding:8px;background:white;color:#0f172a}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.seg{display:flex;gap:4px;flex-wrap:wrap}.seg button{border:1px solid var(--border);background:#fff;border-radius:9px;padding:7px 8px;cursor:pointer;font-weight:700;font-size:12px}.seg button.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}.swatches{display:flex;flex-wrap:wrap;gap:6px}.sw{width:24px;height:24px;border-radius:7px;border:1px solid rgba(15,23,42,.18);cursor:pointer}.sw.on{outline:2px solid var(--accent);outline-offset:2px}.sw.transparent{background:linear-gradient(45deg,#e2e8f0 25%,transparent 25%),linear-gradient(-45deg,#e2e8f0 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#e2e8f0 75%),linear-gradient(-45deg,transparent 75%,#e2e8f0 75%);background-size:10px 10px;background-position:0 0,0 5px,5px -5px,-5px 0}.danger{width:100%;height:34px;border:1px solid #fecaca;background:#fff1f2;color:#be123c;border-radius:10px;cursor:pointer;font-weight:800}.secondary{width:100%;height:34px;border:1px solid var(--border);background:#f8fafc;color:#334155;border-radius:10px;cursor:pointer;font-weight:800;margin-bottom:8px}.hint{font-size:12px;color:#64748b;line-height:1.35;background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:8px}.status{position:absolute;left:14px;bottom:14px;z-index:70;background:white;border:1px solid var(--border);border-radius:999px;padding:7px 10px;font-size:12px;color:#64748b;box-shadow:0 4px 14px rgba(15,23,42,.08)}.status .ok{color:#16a34a}.empty{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;color:#64748b;z-index:2;pointer-events:none}.empty h2{margin:0 0 8px;color:#334155}.empty .shortcuts{margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}.empty .pill{border:1px solid var(--border);border-radius:999px;padding:6px 9px;background:white;color:#475569;font-size:12px;font-weight:800}.ghost{position:absolute;border:1.5px dashed var(--accent);background:rgba(99,102,241,.08);border-radius:10px;z-index:40;pointer-events:none}.marquee{position:absolute;border:1px solid #3b82f6;background:rgba(59,130,246,.1);z-index:70;pointer-events:none}.preview{pointer-events:none;fill:none;stroke:var(--accent);stroke-width:2;stroke-dasharray:6 5}
    /* Inline editor */
    .inline-editor{position:absolute;z-index:300;border:2px solid var(--accent);border-radius:8px;padding:6px 8px;background:rgba(255,255,255,.97);resize:none;box-shadow:0 4px 24px rgba(99,102,241,.3);outline:none;text-align:center;font-weight:600;line-height:1.3;color:#0f172a;overflow:hidden;font-family:Inter,system-ui,sans-serif}
    @media print{@page{size:landscape;margin:.5cm}*{-webkit-print-color-adjust:exact;print-color-adjust:exact}.tabbar,.header,.toolbar,.panel,.status,.grid,.handle,.anchor,.marquee,.ghost,.preview,.empty,.contain-badge{display:none!important}.project-shell,.app,.main,.stage{display:block;width:100vw;height:100vh;overflow:hidden;background:white!important}.world{transform-origin:0 0!important}.node.selected,.node.multi-selected,.frame.selected,.frame.multi-selected,.edge-label.selected{outline:none!important}}
  </style>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const {useEffect,useRef,useState}=React;
    const NL='\n';
    const VERSION='2.0';
    const PROJECTS_KEY='diagrama-projects-v1';
    const PROJECT_PREFIX='diagrama-project-';
    const FILL_COLORS=['#ffffff','#f8fafc','#eef2ff','#ecfeff','#dcfce7','#fef9c3','#ffedd5','#ffe4e6','#fae8ff','#ede9fe','#e0f2fe','#f1f5f9','transparent'];
    const STROKE_COLORS=['#0f172a','#334155','#475569','#64748b','#6366f1','#2563eb','#0891b2','#16a34a','#ca8a04','#ea580c','#e11d48','#9333ea'];
    const EDGE_COLORS=['#334155','#6366f1','#2563eb','#0891b2','#16a34a','#ca8a04','#ea580c','#e11d48','#9333ea','#000000','#94a3b8'];
    const FRAME_BGS=['transparent','#f8fafc','#eef2ff','#ecfeff','#dcfce7','#fef9c3','#ffedd5','#ffe4e6','#fae8ff','#ede9fe','#e0f2fe','#f1f5f9','#fefce8'];
    const uid=p=>`${p}_${Math.random().toString(36).slice(2,11)}`;
    const DEFAULT_STATE={frames:{},shapes:{},edges:{},order:[],view:{tx:160,ty:120,zoom:1}};
    const HISTORY_LIMIT=50;
    const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
    const deepClone=o=>typeof structuredClone==='function'?structuredClone(o):JSON.parse(JSON.stringify(o));
    const esc=s=>String(s??'').replace(/\|/g,'/').replace(/\n/g,' ').trim();
    const uml=s=>String(s??'').replace(/"/g,"'").replace(/\n/g,' ').trim();
    function normalizeOrder(order,frames,shapes){const seen=new Set(),fo=[],so=[];(order||[]).forEach(o=>{if(!o||seen.has(o.kind+o.id))return;seen.add(o.kind+o.id);if(o.kind==='frame'&&frames[o.id])fo.push(o);if(o.kind==='shape'&&shapes[o.id])so.push(o)});Object.keys(frames||{}).forEach(id=>{if(!seen.has('frame'+id))fo.push({kind:'frame',id})});Object.keys(shapes||{}).forEach(id=>{if(!seen.has('shape'+id))so.push({kind:'shape',id})});return[...fo,...so]}

    /* ── PROJECT MANAGEMENT ── */
    function loadProjectsIndex(){try{const r=localStorage.getItem(PROJECTS_KEY);return r?JSON.parse(r):[]}catch{return[]}}
    function saveProjectsIndex(list){localStorage.setItem(PROJECTS_KEY,JSON.stringify(list))}
    function loadProjectData(id){
      try{const r=localStorage.getItem(PROJECT_PREFIX+id);if(r){const p={...DEFAULT_STATE,...JSON.parse(r)};Object.values(p.shapes||{}).forEach(s=>{if(s.showTitle===undefined)s.showTitle=false;if(s.title===undefined)s.title='Título'});Object.values(p.frames||{}).forEach(f=>{if(f.showTitle===undefined)f.showTitle=true});p.order=normalizeOrder(p.order,p.frames||{},p.shapes||{});return p}}catch(e){console.warn('Error cargando proyecto',id,e)}
      return deepClone(DEFAULT_STATE)}
    function tryMigrateOldData(){const keys=['diagrama-libre-v6','diagrama-libre-v5','diagrama-libre-v3'];for(const k of keys){try{const r=localStorage.getItem(k);if(!r)continue;const d=JSON.parse(r);if(Object.keys(d.shapes||{}).length||Object.keys(d.frames||{}).length){const id=uid('proj');localStorage.setItem(PROJECT_PREFIX+id,r);return[{id,name:'Mi diagrama',createdAt:Date.now()}]}}catch{}}return null}
    function initProjectsList(){let list=loadProjectsIndex();if(!list.length){const m=tryMigrateOldData();list=m||[{id:uid('proj'),name:'Proyecto 1',createdAt:Date.now()}];saveProjectsIndex(list)}return list}

    /* ── STORE ── */
    function useStore(projectId){
      const[state,setState]=useState(()=>loadProjectData(projectId));
      const[saved,setSaved]=useState(true);
      const timer=useRef(null),past=useRef([]),future=useRef([]),lastHistory=useRef(0),currentId=useRef(projectId);
      useEffect(()=>{setSaved(false);clearTimeout(timer.current);timer.current=setTimeout(()=>{localStorage.setItem(PROJECT_PREFIX+currentId.current,JSON.stringify(state));setSaved(true);setTimeout(()=>setSaved(null),1500)},400);return()=>clearTimeout(timer.current)},[state]);
      const pushHistory=(prev,coalesce=false)=>{const now=Date.now(),snap=deepClone(prev);if(coalesce&&now-lastHistory.current<350&&past.current.length)past.current[past.current.length-1]=snap;else past.current.push(snap);if(past.current.length>HISTORY_LIMIT)past.current.shift();future.current=[];lastHistory.current=now};
      const update=(fn,coalesce=false)=>setState(prev=>{pushHistory(prev,coalesce);const next=deepClone(prev);fn(next);next.order=normalizeOrder(next.order,next.frames,next.shapes);return next});
      const undo=()=>setState(prev=>{const snap=past.current.pop();if(!snap)return prev;future.current.push(deepClone(prev));if(future.current.length>HISTORY_LIMIT)future.current.shift();lastHistory.current=0;return deepClone(snap)});
      const redo=()=>setState(prev=>{const snap=future.current.pop();if(!snap)return prev;past.current.push(deepClone(prev));if(past.current.length>HISTORY_LIMIT)past.current.shift();lastHistory.current=0;return deepClone(snap)});
      const reset=()=>{if(confirm('¿Vaciar el lienzo de este proyecto?')){pushHistory(state);localStorage.removeItem(PROJECT_PREFIX+currentId.current);setState(deepClone(DEFAULT_STATE))}};
      return{state,setState,update,reset,undo,redo,canUndo:past.current.length>0,canRedo:future.current.length>0,saved}}

    /* ── GEOMETRY ── */
    const anchorNormal={t:{x:0,y:-1},r:{x:1,y:0},b:{x:0,y:1},l:{x:-1,y:0},c:{x:0,y:0}};
    function rectOf(item){return{x:item.x,y:item.y,w:item.w,h:item.h,cx:item.x+item.w/2,cy:item.y+item.h/2,type:item.type}}
    function contains(item,p){return p.x>=item.x&&p.x<=item.x+item.w&&p.y>=item.y&&p.y<=item.y+item.h}
    function containsRect(container,item){return item.x>=container.x&&item.y>=container.y&&item.x+item.w<=container.x+container.w&&item.y+item.h<=container.y+container.h}
    function intersectsRect(a,b){return a.x<=b.x+b.w&&a.x+a.w>=b.x&&a.y<=b.y+b.h&&a.y+a.h>=b.y}
    function anchorPoint(rect,a){return a==='t'?{x:rect.cx,y:rect.y}:a==='r'?{x:rect.x+rect.w,y:rect.cy}:a==='b'?{x:rect.cx,y:rect.y+rect.h}:a==='l'?{x:rect.x,y:rect.cy}:{x:rect.cx,y:rect.cy}}
    function autoAnchors(r1,r2){const dx=r2.cx-r1.cx,dy=r2.cy-r1.cy;if(Math.abs(dx)>Math.abs(dy))return dx>0?['r','l']:['l','r'];return dy>0?['b','t']:['t','b']}
    function buildPath(p1,p2,a1='c',a2='c',routing='curved'){if(routing==='straight')return`M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`;if(routing==='elbow'){const horiz=['l','r'],vert=['t','b'];if(horiz.includes(a1)&&horiz.includes(a2)){const mx=(p1.x+p2.x)/2;return`M ${p1.x} ${p1.y} L ${mx} ${p1.y} L ${mx} ${p2.y} L ${p2.x} ${p2.y}`}if(vert.includes(a1)&&vert.includes(a2)){const my=(p1.y+p2.y)/2;return`M ${p1.x} ${p1.y} L ${p1.x} ${my} L ${p2.x} ${my} L ${p2.x} ${p2.y}`}return`M ${p1.x} ${p1.y} L ${p2.x} ${p1.y} L ${p2.x} ${p2.y}`}const dist=Math.hypot(p2.x-p1.x,p2.y-p1.y),d=Math.min(dist*.45,180);const n1=anchorNormal[a1]||anchorNormal.c,n2=anchorNormal[a2]||anchorNormal.c;const c1={x:p1.x+n1.x*d,y:p1.y+n1.y*d},c2={x:p2.x+n2.x*d,y:p2.y+n2.y*d};return`M ${p1.x} ${p1.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${p2.x} ${p2.y}`}
    function edgeMid(p1,p2){return{x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2}}
    function getFrameChildren(state,frameId){const root=state.frames[frameId];if(!root)return[];const result=new Set();const scan=frId=>{const fr=state.frames[frId];if(!fr)return;Object.values(state.shapes).forEach(sh=>{if(!result.has(sh.id)&&containsRect(fr,sh))result.add(sh.id)});Object.values(state.frames).forEach(child=>{if(child.id!==frId&&child.id!==frameId&&!result.has(child.id)&&containsRect(fr,child)){result.add(child.id);scan(child.id)}})};scan(frameId);return[...result]}

    function nearestAnchor(item,p){const r=rectOf(item);let best=['c',99999];['t','r','b','l'].forEach(a=>{const q=anchorPoint(r,a),d=Math.hypot(q.x-p.x,q.y-p.y);if(d<best[1])best=[a,d]});return best[0]}
    function pickAtPoint(p,state,excludeId){const shapes=[...state.order].filter(o=>o.kind==='shape').reverse();const frames=[...state.order].filter(o=>o.kind==='frame').reverse();for(const o of[...shapes,...frames]){if(o.id===excludeId)continue;const item=o.kind==='shape'?state.shapes[o.id]:state.frames[o.id];if(item&&contains(item,p))return{kind:o.kind,id:o.id,anchor:nearestAnchor(item,p)}}return null}
    function sectionForShape(shape,frames){const containers=frames.filter(f=>containsRect(f,shape));if(!containers.length)return'root';containers.sort((a,b)=>(a.w*a.h)-(b.w*b.h));return containers[0].label||containers[0].id}

    function scopedState(state,scopeFrameId=null){if(!scopeFrameId)return state;const scope=state.frames[scopeFrameId];if(!scope)return state;const frames={},shapes={},edges={};Object.values(state.frames).forEach(fr=>{if(fr.id===scopeFrameId||containsRect(scope,fr))frames[fr.id]=fr});Object.values(state.shapes).forEach(sh=>{if(containsRect(scope,sh))shapes[sh.id]=sh});Object.values(state.edges).forEach(ed=>{const fromOk=!!(shapes[ed.from.id]||frames[ed.from.id]);const toOk=!!(shapes[ed.to.id]||frames[ed.to.id]);if(fromOk&&toOk)edges[ed.id]=ed});const order=state.order.filter(o=>frames[o.id]||shapes[o.id]);return{...state,frames,shapes,edges,order}}

    /* ── EXPORTS ── */
    function nodeLabelForUml(shape){return uml(shape.showTitle&&shape.title?`${shape.title}: ${shape.text}`:shape.text)}
    function generatePlantUML(state,scopeFrameId=null){const scoped=scopedState(state,scopeFrameId);const frames=Object.values(scoped.frames),shapes=Object.values(scoped.shapes),edges=Object.values(scoped.edges);const lines=['@startuml','skinparam componentStyle rectangle','skinparam shadowing false',''];const emitted=new Set();const emitFrame=(fr,depth=0)=>{if(emitted.has(fr.id))return;emitted.add(fr.id);const pad='  '.repeat(depth);lines.push(`${pad}package "${uml(fr.label)}" as ${fr.id} {`);frames.filter(child=>sectionForFrame(child,frames)===fr.id).forEach(child=>emitFrame(child,depth+1));shapes.filter(sh=>sectionIdForShape(sh,frames)===fr.id).forEach(sh=>{const type=sh.type==='sticky'?'note':sh.type==='text'?'rectangle':'component';if(type==='note')lines.push(`${pad}  note "${nodeLabelForUml(sh)}" as ${sh.id}`);else lines.push(`${pad}  ${type} "${nodeLabelForUml(sh)}" as ${sh.id}`)});lines.push(`${pad}}`,'')};frames.filter(fr=>sectionForFrame(fr,frames)==='root').forEach(fr=>emitFrame(fr,0));shapes.filter(sh=>sectionIdForShape(sh,frames)==='root').forEach(sh=>lines.push(`component "${nodeLabelForUml(sh)}" as ${sh.id}`));if(shapes.length||frames.length)lines.push('');edges.forEach(ed=>{if((scoped.shapes[ed.from.id]||scoped.frames[ed.from.id])&&(scoped.shapes[ed.to.id]||scoped.frames[ed.to.id])){const arrow=ed.arrowStart&&ed.arrowEnd!==false?'<-->':ed.arrowEnd===false?'--':'-->';lines.push(`${ed.from.id} ${arrow} ${ed.to.id}${ed.label?` : ${uml(ed.label)}`:''}`)}});lines.push('@enduml','');return lines.join(NL)}
    function generateMarkdown(state,scopeFrameId=null){const scoped=scopedState(state,scopeFrameId);const frames=Object.values(scoped.frames),shapes=Object.values(scoped.shapes),edges=Object.values(scoped.edges);const lines=[];lines.push('# Export DiagramaOS');if(scopeFrameId)lines.push('',`> Scope: ${esc(state.frames[scopeFrameId]?.label||scopeFrameId)}`);lines.push('','## Sections','');if(!frames.length)lines.push('- root');frames.forEach(fr=>lines.push(`- ${esc(fr.label)} (${Math.round(fr.w)}x${Math.round(fr.h)})`));lines.push('','## Elementos','','| ID | Tipo | Título | Texto | Section |','|---|---|---|---|---|');shapes.forEach(sh=>lines.push(`| ${sh.id} | ${sh.type} | ${esc(sh.showTitle?sh.title:'')} | ${esc(sh.text)} | ${esc(sectionForShape(sh,frames))} |`));lines.push('','## Relaciones','','| Desde | Hacia | Label |','|---|---|---|');edges.forEach(ed=>{const from=scoped.shapes[ed.from.id]?.text||scoped.frames[ed.from.id]?.label||ed.from.id;const to=scoped.shapes[ed.to.id]?.text||scoped.frames[ed.to.id]?.label||ed.to.id;lines.push(`| ${esc(from)} | ${esc(to)} | ${esc(ed.label||'')} |`)});lines.push('','## PlantUML','','```plantuml',generatePlantUML(state,scopeFrameId).trim(),'```','');return lines.join(NL)}
    function generateJSON(state,scopeFrameId=null){return JSON.stringify(scopedState(state,scopeFrameId),null,2)}
    function stateFromJSON(text){const data=JSON.parse(text);const next={...DEFAULT_STATE,frames:data.frames||{},shapes:data.shapes||{},edges:data.edges||{},order:data.order||[],view:data.view||DEFAULT_STATE.view};Object.values(next.shapes).forEach(sh=>{if(sh.showTitle===undefined)sh.showTitle=false;if(sh.title===undefined)sh.title='Título'});Object.values(next.frames).forEach(fr=>{if(fr.showTitle===undefined)fr.showTitle=true});next.order=normalizeOrder(next.order,next.frames,next.shapes);return next}
    function extractPlantUML(text){const start=text.indexOf('@startuml');const end=text.indexOf('@enduml');if(start>=0&&end>=0)return text.slice(start,end+8);const fence=text.indexOf('```plantuml');if(fence>=0){const after=text.slice(fence+11);const close=after.indexOf('```');return close>=0?after.slice(0,close):after}return text}
    function stateFromPlantUML(text){const raw=extractPlantUML(text);const lines=raw.split(NL).map(x=>x.trim()).filter(Boolean);const frames={},shapes={},edges={},order=[];const stack=[];let frameIndex=0,shapeIndex=0,edgeIndex=0;const makeId=(prefix,rawId)=>{const safe=String(rawId||'').split('').map(ch=>/[a-zA-Z0-9_]/.test(ch)?ch:'_').join('');return safe&&/[a-zA-Z]/.test(safe[0])?safe:`${prefix}_${safe||Math.random().toString(36).slice(2,7)}`};lines.forEach(line=>{if(line.startsWith('@')||line.startsWith('skinparam'))return;if(line==='}'){stack.pop();return}if(line.startsWith('package ')){const q1=line.indexOf('"'),q2=line.indexOf('"',q1+1);const label=q1>=0&&q2>q1?line.slice(q1+1,q2):`Section ${frameIndex+1}`;const asPos=line.indexOf(' as ');const id=makeId('fr',asPos>=0?line.slice(asPos+4).replace('{','').trim():`fr_${frameIndex}`);const depth=stack.length;const idx=frameIndex++;frames[id]={id,x:80+depth*40,y:80+idx*45,w:360,h:240,label,showTitle:true,bgColor:'rgba(238,242,255,.45)',strokeColor:'#6366f1',dashed:true};order.unshift({kind:'frame',id});stack.push(id);return}const componentWords=['component ','rectangle ','note ','database ','actor '];const word=componentWords.find(w=>line.startsWith(w));if(word){const q1=line.indexOf('"'),q2=line.indexOf('"',q1+1);const label=q1>=0&&q2>q1?line.slice(q1+1,q2):`Nodo ${shapeIndex+1}`;const asPos=line.indexOf(' as ');const id=makeId('sh',asPos>=0?line.slice(asPos+4).trim():`sh_${shapeIndex}`);const parentId=stack[stack.length-1];const parent=parentId?frames[parentId]:null;const idx=shapeIndex++;const type=word.trim()==='note'?'sticky':word.trim()==='rectangle'?'rect':'round';shapes[id]={id,type,x:(parent?parent.x+30:80)+(idx%3)*190,y:(parent?parent.y+40:80)+Math.floor(idx/3)*100,w:160,h:70,title:'Título',showTitle:false,text:label,fill:type==='sticky'?'#fef08a':'#ffffff',stroke:type==='sticky'?'#ca8a04':'#475569',textColor:type==='sticky'?'#713f12':'#0f172a',fontSize:13};order.push({kind:'shape',id});return}const arrow     function importToState(text,filename){const name=(filename||'').toLowerCase();if(name.endsWith('.json'))return stateFromJSON(text);if(name.endsWith('.uml')||name.endsWith('.puml')||name.endsWith('.md'))return stateFromPlantUML(text);try{return stateFromJSON(text)}catch{return stateFromPlantUML(text)}}

    function runSmokeTests(){const testState={frames:{fr_a:{id:'fr_a',x:0,y:0,w:300,h:200,label:'Section A',showTitle:true,bgColor:'transparent',strokeColor:'#6366f1',dashed:true}},shapes:{sh_a:{id:'sh_a',type:'rect',x:20,y:20,w:80,h:50,text:'Caja A',title:'Sistema',showTitle:true},sh_b:{id:'sh_b',type:'sticky',x:360,y:20,w:80,h:50,text:'Caja B',showTitle:false}},edges:{ed_a:{id:'ed_a',from:{id:'sh_a',anchor:'r'},to:{id:'sh_b',anchor:'l'},routing:'curved',color:'#334155',strokeWidth:2,arrowEnd:true,label:'consulta'}},order:[{kind:'frame',id:'fr_a'},{kind:'shape',id:'sh_a'},{kind:'shape',id:'sh_b'}],view:{tx:0,ty:0,zoom:1}};const md=generateMarkdown(testState),umlText=generatePlantUML(testState);console.assert(md.includes('```plantuml'),'MD debería incluir bloque PlantUML');console.assert(umlText.startsWith('@startuml'),'UML debe iniciar con @startuml');console.assert(umlText.trim().endsWith('@enduml'),'UML debe terminar con @enduml')}

    const HandleSet=({onResize})=><>{['nw','n','ne','e','se','s','sw','w'].map(h=><span key={h} className={`handle h-${h}`} onMouseDown={e=>onResize(e,h)}/>)}</>;

    function Edges({state,selectedIds,setSelected,preview}){const nodes={...state.frames,...state.shapes};return <><svg className="edge-layer"><defs>{EDGE_COLORS.map(c=><React.Fragment key={c}><marker id={`ah-end-${c.slice(1)}`} markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill={c}/></marker><marker id={`ah-start-${c.slice(1)}`} markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M9,0 L9,6 L0,3 z" fill={c}/></marker></React.Fragment>)}</defs>{Object.values(state.edges).map(ed=>{const from=nodes[ed.from.id],to=nodes[ed.to.id];if(!from||!to)return null;const r1=rectOf(from),r2=rectOf(to);const[aa,bb]=(!ed.from.anchor||!ed.to.anchor)?autoAnchors(r1,r2):[ed.from.anchor,ed.to.anchor];const p1=anchorPoint(r1,aa),p2=anchorPoint(r2,bb),path=buildPath(p1,p2,aa,bb,ed.routing),color=ed.color||'#334155';return <g key={ed.id} onClick={e=>{e.stopPropagation();setSelected([{kind:'edge',id:ed.id}])}}><path className="edge-hit" d={path}/><path className="edge-visible" d={path} stroke={color} strokeWidth={ed.strokeWidth||2} strokeDasharray={ed.dashed?'7 5':undefined} markerEnd={ed.arrowEnd!==false?`url(#ah-end-${color.slice(1)})`:undefined} markerStart={ed.arrowStart?`url(#ah-start-${color.slice(1)})`:undefined}/></g>})}{preview&&<path className="preview" d={preview}/>}</svg>{Object.values(state.edges).map(ed=>{const from=nodes[ed.from.id],to=nodes[ed.to.id];if(!from||!to||!ed.label)return null;const m=edgeMid(anchorPoint(rectOf(from),ed.from.anchor),anchorPoint(rectOf(to),ed.to.anchor));const sel=selectedIds.some(s=>s.kind==='edge'&&s.id===ed.id);return <div key={`lbl-${ed.id}`} className={`edge-label ${sel?'selected':''}`} style={{left:m.x,top:m.y}} onMouseDown={e=>e.stopPropagation()} onClick={()=>setSelected([{kind:'edge',id:ed.id}])}>{ed.label}</div>})}</>}

    function Shape({shape,selected,multi,onSelect,onMove,onResize,onAnchor,onText}){const st={left:shape.x,top:shape.y,width:shape.w,height:shape.h,background:shape.fill??undefined,borderColor:shape.stroke??undefined,color:shape.textColor??undefined,fontSize:shape.fontSize||13};const content=<>{shape.showTitle&&<div className="node-title">{shape.title||'Título'}</div>}<div className="node-body">{shape.text}</div></>;if(shape.type==='diamond')return <div className={`diamond-wrap ${selected?'selected':''} ${multi?'multi-selected':''}`} style={{...st,'--diamond-fill':shape.fill||'#ffffff','--diamond-stroke':shape.stroke||'#475569'}} onMouseDown={onMove} onClick={onSelect} onDoubleClick={onText}><div className="diamond-text">{shape.showTitle&&<div className="diamond-title">{shape.title||'Título'}</div>}{shape.text}</div>{selected&&<HandleSet onResize={onResize}/>}<Anchors onAnchor={onAnchor}/></div>;return <div className={`node t-${shape.type} ${selected?'selected':''} ${multi?'multi-selected':''}`} style={st} onMouseDown={onMove} onClick={onSelect} onDoubleClick={onText}>{content}{selected&&<HandleSet onResize={onResize}/>}<Anchors onAnchor={onAnchor}/></div>}
    function Frame({frame,selected,multi,childCount,onSelect,onMove,onResize,onAnchor,onLabel}){return <div className={`frame ${selected?'selected':''} ${multi?'multi-selected':''}`} style={{left:frame.x,top:frame.y,width:frame.w,height:frame.h,background:frame.bgColor,borderColor:frame.strokeColor,borderStyle:frame.dashed?'dashed':'solid'}} onMouseDown={onMove} onClick={onSelect}><div className={`frame-label ${frame.showTitle===false?'hidden-label':''}`} style={{background:frame.strokeColor}} onDoubleClick={onLabel}>{frame.label}</div>{childCount>0&&<div className="contain-badge">{childCount}</div>}{selected&&<HandleSet onResize={onResize}/>}<Anchors onAnchor={onAnchor}/></div>}

    /* ── INLINE EDITOR ── */
    function InlineEditor({edit,view,item,onCommit,onCancel}){
      const[val,setVal]=useState(edit.initialValue);
      const ref=useRef(null);
      useEffect(()=>{ref.current?.focus();ref.current?.select()},[]);
      const{zoom,tx,ty}=view;
      const style=edit.kind==='frame'
        ?{left:item.x*zoom+tx+10,top:item.y*zoom+ty-32,width:Math.min(item.w*zoom,220),height:26,fontSize:11,textAlign:'left',textTransform:'uppercase',letterSpacing:'.04em',fontFamily:'DM Mono,monospace'}
        :{left:item.x*zoom+tx,top:item.y*zoom+ty,width:item.w*zoom,height:item.h*zoom,fontSize:(item.fontSize||13)*zoom};
      function commit(){onCommit(val)}
      return <textarea ref={ref} className="inline-editor" style={style} value={val}
        onChange={e=>setVal(e.target.value)}
        onBlur={commit}
        onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();commit()}if(e.key==='Escape'){e.preventDefault();onCancel()}}}
        onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}/>}

      function exportMarkdown(scopeFrameId=null){downloadText(generateMarkdown(state,scopeFrameId),scopeFrameId?'diagramaos-section.md':'diagramaos-export.md','text/markdown;charset=utf-8')}
      function exportUML(scopeFrameId=null){downloadText(generatePlantUML(state,scopeFrameId),scopeFrameId?'diagramaos-section.uml':'diagramaos-export.uml','text/plain;charset=utf-8')}
      function getExportBounds(scopeFrameId=null){const scoped=scopedState(state,scopeFrameId);const items=[...Object.values(scoped.frames),...Object.values(scoped.shapes)];if(!items.length)return null;const minX=Math.min(...items.map(i=>i.x)),minY=Math.min(...items.map(i=>i.y-26)),maxX=Math.max(...items.map(i=>i.x+i.w)),maxY=Math.max(...items.map(i=>i.y+i.h));return{minX,minY,maxX,maxY,w:maxX-minX,h:maxY-minY}}
      async function exportPNG(scopeFrameId=null){if(!window.html2canvas){alert('No se pudo cargar html2canvas.');return}const bounds=getExportBounds(scopeFrameId);if(!bounds){alert('El lienzo está vacío.');return}const world=stageRef.current.querySelector('.world');const clone=world.cloneNode(true);clone.style.transform=`translate(${-bounds.minX+30}px, ${-bounds.minY+30}px) scale(1)`;clone.style.left='0px';clone.style.top='0px';clone.querySelectorAll('.handle,.anchor,.contain-badge').forEach(el=>el.remove());const wrap=document.createElement('div');wrap.style.cssText=`position:fixed;left:-100000px;top:0;width:${bounds.w+60}px;height:${bounds.h+60}px;overflow:hidden;background:transparent`;wrap.appendChild(clone);document.body.appendChild(wrap);try{const canvas=await html2canvas(wrap,{backgroundColor:null,scale:2,width:bounds.w+60,height:bounds.h+60});const url=canvas.toDataURL('image/png');const a=document.createElement('a');a.href=url;a.download=scopeFrameId?'diagramaos-section.png':'diagramaos-export.png';document.body.appendChild(a);a.click();a.remove()}finally{wrap.remove()}}
      function exportSection(sectionId,format){if(format==='md')return exportMarkdown(sectionId);if(format==='uml')return exportUML(sectionId);if(format==='json')return exportJSON(sectionId);if(format==='png')return exportPNG(sectionId);if(format==='pdf')return exportPDF(sectionId)}
      function exportJSON(scopeFrameId=null){downloadText(generateJSON(state,scopeFrameId),scopeFrameId?'diagramaos-section.json':'diagramaos-export.json','application/json;charset=utf-8')}
      async function handleImportFile(e){const file=e.target.files&&e.target.files[0];if(!file)return;try{const text=await file.text();const next=importToState(text,file.name);if(Object.keys(next.shapes).length===0&&Object.keys(next.frames).length===0&&!confirm('No detecté elementos editables en el archivo. ¿Importar de todas formas?'))return;setState(next);setSelectedIds([]);setExportOpen(false)}catch(err){console.error(err);alert('No pude importar el archivo. Revisa que sea .json, .uml o .md con bloque PlantUML válido.')}finally{e.target.value=''}}
      function exportPDF(scopeFrameId=null){const bounds=getExportBounds(scopeFrameId);if(!bounds){alert('El lienzo está vacío.');return}const pad=30,w=bounds.w+pad*2,h=bounds.h+pad*2,fit=Math.min(1056/w,720/h);const st=document.createElement('style');st.id='__print_fit';st.textContent=`@media print{.world{transform:translate(${-(bounds.minX-pad)*fit}px,${-(bounds.minY-pad)*fit}px) scale(${fit})!important}}`;document.head.appendChild(st);setTimeout(()=>window.print(),80);window.addEventListener('afterprint',()=>st.remove(),{once:true})}
      const gridStyle={backgroundSize:`${24*state.view.zoom}px ${24*state.view.zoom}px`,backgroundPosition:`${state.view.tx}px ${state.view.ty}px`};
      const transform=`translate(${state.view.tx}px, ${state.view.ty}px) scale(${state.view.zoom})`;
      const empty=!Object.keys(state.frames).length&&!Object.keys(state.shapes).length&&!Object.keys(state.edges).length;
      // Inline edit context
      const inlineItem=inlineEdit?(inlineEdit.kind==='shape'?state.shapes[inlineEdit.id]:state.frames[inlineEdit.id]):null;
      return <div className="app">
        <header className="header">
          <div className="brand">🗂 DiagramaOS <small>/ Lienzo libre</small> <span className="ver">v{VERSION}</span></div>
          <div className="header-actions">
            <button className="hbtn" title="Undo" onClick={undo} disabled={!canUndo}><span className="ico">↶</span><span className="txt">undo</span></button>
            <button className="hbtn" title="Redo" onClick={redo} disabled={!canRedo}><span className="ico">↷</span><span className="txt">redo</span></button>
            <button className="hbtn" onClick={()=>setView({zoom:clamp(state.view.zoom-.1,.15,4)})}><span className="ico">−</span></button>
            <span className="chip">{Math.round(state.view.zoom*100)}%</span>
            <button className="hbtn" onClick={()=>setView({zoom:clamp(state.view.zoom+.1,.15,4)})}><span className="ico">+</span></button>
            <button className="hbtn" onClick={fitView}><span className="ico">⤢</span><span className="txt">fit</span></button>
            <button className="hbtn" onClick={autoLayout}><span className="ico">⇄</span><span className="txt">ordenar</span></button>
            <button className="hbtn" onClick={()=>importRef.current?.click()}><span className="ico">⇣</span><span className="txt">import</span></button>
            <input ref={importRef} className="hidden-input" type="file" accept=".json,.md,.uml,.puml,text/markdown,application/json" onChange={handleImportFile}/>
            <div className="dropdown">
              <button className="hbtn" onClick={()=>setExportOpen(!exportOpen)}><span className="ico">⇡</span><span className="txt">export</span><span className="ico">▾</span></button>
              {exportOpen&&<div className="menu">
                <button onClick={()=>{exportMarkdown();setExportOpen(false)}}>Markdown .md</button>
                <button onClick={()=>{exportUML();setExportOpen(false)}}>PlantUML .uml</button>
                <button onClick={()=>{exportJSON();setExportOpen(false)}}>JSON .json</button>
                <button onClick={()=>{exportPNG();setExportOpen(false)}}>PNG transparente</button>
                <button onClick={()=>{exportPDF();setExportOpen(false)}}>PDF</button>
              </div>}
            </div>
            <button className="hbtn" onClick={reset}><span className="ico">×</span><span className="txt">vaciar</span></button>
            <span className="chip">● {saved===true?'guardado':saved===false?'guardando':'sync'}</span>
          </div>
        </header>
        <main className={`main ${hasPanel?'has-panel':''}`}>
          <nav className="toolbar">{tools.map((t,i)=>t==='sep'?<div className="tool-sep" key={i}/>:<button key={t[0]} className={`tool ${tool===t[0]?'active':''}`} onClick={()=>setTool(t[0])}>{Icons[t[0]]}<span className="tip">{t[1]} <kbd>{t[2]}</kbd></span></button>)}</nav>
          <section ref={stageRef} className={`stage ${tool==='hand'?'hand':''} ${drag?.kind==='pan'?'panning':''}`} onMouseDown={beginStage} onMouseMove={move} onMouseUp={up} onMouseLeave={up} onWheel={onWheel}>
            <div className="grid" style={gridStyle}/>
            {empty&&<div className="empty"><h2>Lienzo en blanco</h2><div>Crea un section para agrupar tu diagrama,<br/>o agrega cajas y conectores libremente.</div><div className="shortcuts"><span className="pill">[F] Section</span><span className="pill">[R] Rectángulo</span><span className="pill">[S] Sticky</span><span className="pill">[C] Conector</span><span className="pill">[H] Mano</span></div></div>}
            <div className="world" style={{transform}}>
              <Edges state={state} selectedIds={selectedIds} setSelected={setSelectedIds} preview={preview}/>
              {state.order.map(o=>{if(o.kind==='frame'){const childCount=getFrameChildren(state,o.id).length;return <Frame key={o.id} frame={state.frames[o.id]} selected={isSelected('frame',o.id)&&selectedIds.length===1} multi={isSelected('frame',o.id)&&selectedIds.length>1} childCount={childCount} onSelect={e=>{e.stopPropagation();toggleSelection('frame',o.id,e.shiftKey||e.metaKey||e.ctrlKey)}} onMove={e=>nodeMove(e,'frame',o.id)} onResize={(e,h)=>resize(e,'frame',o.id,h)} onAnchor={(e,a)=>anchor(e,o.id,a)} onLabel={()=>editLabel(o.id)}/>}return <Shape key={o.id} shape={state.shapes[o.id]} selected={isSelected('shape',o.id)&&selectedIds.length===1} multi={isSelected('shape',o.id)&&selectedIds.length>1} onSelect={e=>{e.stopPropagation();toggleSelection('shape',o.id,e.shiftKey||e.metaKey||e.ctrlKey)}} onMove={e=>nodeMove(e,'shape',o.id)} onResize={(e,h)=>resize(e,'shape',o.id,h)} onAnchor={(e,a)=>anchor(e,o.id,a)} onText={()=>editText(o.id)}/>})}
            </div>
            {inlineEdit&&inlineItem&&<InlineEditor edit={inlineEdit} view={state.view} item={inlineItem} onCommit={commitInlineEdit} onCancel={()=>setInlineEdit(null)}/>}
            {ghost&&<div className="ghost" style={{left:ghost.x*state.view.zoom+state.view.tx,top:ghost.y*state.view.zoom+state.view.ty,width:ghost.w*state.view.zoom,height:ghost.h*state.view.zoom}}/>}
            {marquee&&<div className="marquee" style={{left:marquee.x*state.view.zoom+state.view.tx,top:marquee.y*state.view.zoom+state.view.ty,width:marquee.w*state.view.zoom,height:marquee.h*state.view.zoom}}/>}
            <div className="status"><span className={saved===true?'ok':''}>●</span> {saved===true?'guardado':saved===false?'guardando':'sincronizado'}</div>
          </section>
          <Panel state={state} selectedIds={selectedIds} setSelectedIds={setSelectedIds} update={update} onExportSection={exportSection}/>
        </main>
      </div>}

    /* ── PROJECT SHELL ── */
    function ProjectShell(){
      const[projects,setProjects]=useState(()=>initProjectsList());
      const[activeId,setActiveId]=useState(()=>loadProjectsIndex()[0]?.id||null);
      function addProject(){const id=uid('proj');const name=`Proyecto ${projects.length+1}`;const next=[...projects,{id,name,createdAt:Date.now()}];setProjects(next);saveProjectsIndex(next);setActiveId(id)}
      function deleteProject(id){if(projects.length<=1)return;const proj=projects.find(p=>p.id===id);if(!confirm(`¿Eliminar "${proj?.name}"? Esta acción no se puede deshacer.`))return;localStorage.removeItem(PROJECT_PREFIX+id);const next=projects.filter(p=>p.id!==id);setProjects(next);saveProjectsIndex(next);if(activeId===id)setActiveId(next[0].id)}
      function renameProject(id,name){const next=projects.map(p=>p.id===id?{...p,name}:p);setProjects(next);saveProjectsIndex(next)}
      return <div className="project-shell">
        <TabBar projects={projects} activeId={activeId} onSwitch={setActiveId} onAdd={addProject} onDelete={deleteProject} onRename={renameProject}/>
        <DiagramApp key={activeId} projectId={activeId}/>
      </div>}

    ReactDOM.createRoot(document.getElementById('root')).render(<ProjectShell/>);
  </script>
</body>
</html>
